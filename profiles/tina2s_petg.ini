# PrusaSlicer config bundle -- WEEFUN Tina 2S, PETG (marginal / out-of-spec).
# Build volume 100 x 105 x 100 mm, 0.4mm nozzle, Marlin.
# WARNING: the Tina 2S bed maxes at 60C. PETG normally wants 70-80C. This profile
# pins bed at 60C and forces a brim + glue-stick workflow to compensate. Treat
# adhesion as marginal; first-layer failures are expected without a clean, glued plate.

# --- printer / machine ---
printer_technology = FFF
bed_shape = 0x0,100x0,100x105,0x105
max_print_height = 100
nozzle_diameter = 0.4
gcode_flavor = marlin
use_relative_e_distances = 0
retract_length = 2.0
retract_speed = 40
retract_lift = 0.2
travel_speed = 120
machine_max_acceleration_extruding = 1000
# Ported from Cura's weefun_tina2s definition. The Tina 2S MUST auto-level (G29)
# each print or the first layer rides too high; M203 caps the slow Z axis' feedrate.
start_gcode = M203 Z15\nM104 S150 ; pre-warm to avoid ooze during leveling\nM140 S{first_layer_bed_temperature[0]}\nG28 Z\nG28 X Y\nG1 X55 Y55 F1000\nM190 S{first_layer_bed_temperature[0]} ; level a hot bed\nG29 ; auto bed leveling\nM107\nG90\nM82\nM109 S{first_layer_temperature[0]}\nG92 E0\nG1 X90 Y6 Z0.27 F2000\nG1 X20 Y6 Z0.27 E15 F1000 ; purge line\nG92 E0\nM203 Z5
end_gcode = M203 Z15\nM104 S0\nM140 S0\nM107\nG92 E0\nG0 E-1 F300\nG28 Z F300\nG28 X0 Y0\nG1 Y90 F1000

# --- print / process ---
layer_height = 0.2
first_layer_height = 0.24
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 20%
fill_pattern = gyroid
skirts = 0
brim_width = 5
support_material = 0
support_material_threshold = 45
first_layer_speed = 18
perimeter_speed = 40
infill_speed = 50

# --- filament (PETG) ---
filament_diameter = 1.75
filament_density = 1.27
temperature = 235
first_layer_temperature = 240
# 58, not 60: M190 would hang waiting for the bed's unreachable max. Adhesion is
# already marginal here -> rely on the forced brim + a glue stick.
bed_temperature = 58
first_layer_bed_temperature = 58
fan_always_on = 1
cooling = 1
min_fan_speed = 30
max_fan_speed = 50
disable_fan_first_layers = 3
filament_type = PETG
