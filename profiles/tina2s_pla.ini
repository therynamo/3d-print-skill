# PrusaSlicer config bundle -- WEEFUN Tina 2S, PLA (default profile)
# Build volume 100 x 105 x 100 mm, 0.4mm nozzle, Marlin, heated bed (max 60C).
# Self-contained: unspecified keys fall back to PrusaSlicer defaults.

# --- printer / machine ---
printer_technology = FFF
bed_shape = 0x0,100x0,100x105,0x105
max_print_height = 100
nozzle_diameter = 0.4
gcode_flavor = marlin
# G29 probe triggers slightly deep -> first layer over-squishes (elephant's foot,
# ~0.3mm short on a 20mm calcube). Raise all moves 0.1mm to recover height/foot.
z_offset = 0.1
use_relative_e_distances = 0
retract_length = 1.5
retract_speed = 40
retract_lift = 0.2
travel_speed = 120
machine_max_acceleration_extruding = 1000
# Ported from Cura's weefun_tina2s definition. The Tina 2S MUST auto-level (G29)
# each print or the first layer rides too high; M203 caps the slow Z axis' feedrate.
start_gcode = M203 Z15\nM104 S150 ; pre-warm to avoid ooze during leveling\nM140 S{first_layer_bed_temperature[0]}\nG28 Z\nG28 X Y\nG1 X55 Y55 F1000\nM190 S{first_layer_bed_temperature[0]} ; level a hot bed\nG29 ; auto bed leveling\nM107\nG90\nM82\nM109 S{first_layer_temperature[0]}\nG92 E0\nG1 X90 Y6 Z0.27 F2000\nG1 X20 Y6 Z0.27 E15 F1000 ; purge line\nG92 E0\nM203 Z5
end_gcode = M203 Z15\nM104 S0\nM140 S0\nM107\nG92 E0\nG0 E-1 F300\nG28 Z F300\nG28 X0 Y0\nG1 Y90 F1000

# --- print / process ---
layer_height = 0.2
first_layer_height = 0.24
perimeters = 3
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 18%
fill_pattern = gyroid
skirts = 1
skirt_distance = 2
brim_width = 0
support_material = 0
support_material_threshold = 40
first_layer_speed = 20
perimeter_speed = 50
infill_speed = 60

# --- filament (PLA) ---
# NOTE: bed target is 55, not the Tina 2S max of 60. M190 blocks until the bed
# reaches target; a target at the bed's ceiling can hang forever because the bed
# asymptotes just below 60. 55 is reached reliably and adheres PLA fine.
filament_diameter = 1.75
filament_density = 1.24
temperature = 205
first_layer_temperature = 210
bed_temperature = 55
first_layer_bed_temperature = 55
fan_always_on = 1
cooling = 1
min_fan_speed = 100
max_fan_speed = 100
disable_fan_first_layers = 1
filament_type = PLA
