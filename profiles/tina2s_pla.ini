# PrusaSlicer config bundle -- WEEFUN Tina 2S, PLA (default profile)
# Build volume 100 x 105 x 100 mm, 0.4mm nozzle, Marlin, heated bed (max 60C).
# Self-contained: unspecified keys fall back to PrusaSlicer defaults.

# --- printer / machine ---
printer_technology = FFF
bed_shape = 0x0,100x0,100x105,0x105
max_print_height = 100
nozzle_diameter = 0.4
gcode_flavor = marlin
use_relative_e_distances = 0
retract_length = 1.5
retract_speed = 40
retract_lift = 0.2
travel_speed = 120
machine_max_acceleration_extruding = 1000
start_gcode = G90\nM83\nG28 ; home all axes\nG1 Z5 F600\nM104 S{first_layer_temperature[0]}\nM140 S{first_layer_bed_temperature[0]}\nM190 S{first_layer_bed_temperature[0]}\nM109 S{first_layer_temperature[0]}\nG92 E0\nG1 Z0.28 F600\nG1 X5 Y5 F2400\nG1 X95 E12 F1000 ; purge line\nG92 E0
end_gcode = M104 S0\nM140 S0\nG91\nG1 Z5 F600\nG90\nG1 X0 Y105 F2400\nM84 ; disable motors

# --- print / process ---
layer_height = 0.2
first_layer_height = 0.24
perimeters = 3
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 18%
fill_pattern = gyroid
skirts = 1
skirt_distance = 2
brim_width = 0
support_material = 0
support_material_threshold = 40
first_layer_speed = 20
perimeter_speed = 50
infill_speed = 60

# --- filament (PLA) ---
filament_diameter = 1.75
filament_density = 1.24
temperature = 205
first_layer_temperature = 210
bed_temperature = 60
first_layer_bed_temperature = 60
fan_always_on = 1
cooling = 1
min_fan_speed = 100
max_fan_speed = 100
disable_fan_first_layers = 1
filament_type = PLA
